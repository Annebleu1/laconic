name: CI laconic - Quality & Build Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ÉTAPE 1 : Vérification de la qualité du code
  quality-check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Linting (Check style)
        run: npm run lint || echo "No lint script yet"

      - name: 🧪 Run Unit Tests
        run: npm test

  # ÉTAPE 2 : Vérification que Docker peut construire l'image
  docker-check:
    name: Docker Build Check
    needs: quality-check # On ne build que si les tests passent
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker Image (Dry Run)
        run: |
          docker build -t laconic-app:test .
